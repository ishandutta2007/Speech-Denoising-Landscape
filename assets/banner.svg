<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#grad1)" />
  
  <!-- Waveform abstraction -->
  <g fill="#ffffff" opacity="0.3">
    <rect x="100" y="180" width="10" height="40" rx="5" />
    <rect x="120" y="150" width="10" height="100" rx="5" />
    <rect x="140" y="120" width="10" height="160" rx="5" />
    <rect x="160" y="160" width="10" height="80" rx="5" />
    <rect x="180" y="140" width="10" height="120" rx="5" />
    <rect x="200" y="100" width="10" height="200" rx="5" />
    <rect x="220" y="170" width="10" height="60" rx="5" />
    <rect x="240" y="130" width="10" height="140" rx="5" />
    <rect x="260" y="150" width="10" height="100" rx="5" />
    <rect x="280" y="110" width="10" height="180" rx="5" />
    <rect x="300" y="180" width="10" height="40" rx="5" />
    
    <!-- Mirror side -->
    <rect x="890" y="180" width="10" height="40" rx="5" />
    <rect x="910" y="150" width="10" height="100" rx="5" />
    <rect x="930" y="120" width="10" height="160" rx="5" />
    <rect x="950" y="160" width="10" height="80" rx="5" />
    <rect x="970" y="140" width="10" height="120" rx="5" />
    <rect x="990" y="100" width="10" height="200" rx="5" />
    <rect x="1010" y="170" width="10" height="60" rx="5" />
    <rect x="1030" y="130" width="10" height="140" rx="5" />
    <rect x="1050" y="150" width="10" height="100" rx="5" />
    <rect x="1070" y="110" width="10" height="180" rx="5" />
    <rect x="1090" y="180" width="10" height="40" rx="5" />
  </g>

  <!-- Text -->
  <text x="50%" y="200" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">Speech Denoising Landscape</text>
  <text x="50%" y="260" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#ffffff" opacity="0.9" text-anchor="middle">Curated List of SOTA Audio Enhancement Models &amp; Resources</text>
  
  <!-- Subtle line -->
  <line x1="400" y1="225" x2="800" y2="225" stroke="#ffffff" stroke-width="2" opacity="0.5" />
</svg>
